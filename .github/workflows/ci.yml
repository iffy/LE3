name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        id: cargo-cache
        uses: Swatinem/rust-cache@v2
        with:
          # Default is false: a failed job does not update the cache, so repeated
          # failures keep paying full dependency compile cost.
          cache-on-failure: true
          shared-key: ci

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libwayland-dev \
            libssl-dev \
            libvulkan-dev \
            mesa-vulkan-drivers \
            libgtk-3-dev \
            xvfb

      - name: cargo test
        run: |
          if [[ "${{ steps.cargo-cache.outputs.cache-hit }}" == "true" ]]; then
            echo "Cargo cache hit — dependency artifacts restored."
          else
            echo "Cargo cache miss — compiling dependencies (~2 min on a cold runner)."
          fi
          cargo test

      # cargo test builds a test harness, not target/debug/bearcad — needed for smoke/scripts.
      - name: cargo build
        run: cargo build

      - name: Launch smoke test
        run: |
          set +e
          timeout 2 xvfb-run -a ./target/debug/bearcad
          code=$?
          set -e
          if [[ $code -eq 0 || $code -eq 124 ]]; then
            echo "App launched successfully (exit code $code)."
          else
            echo "App failed to launch (exit code $code)." >&2
            exit "$code"
          fi

      - name: Run example scripts
        run: |
          shopt -s nullglob
          scripts=(examples/*.lua)
          if [[ ${#scripts[@]} -eq 0 ]]; then
            echo "No example Lua scripts found in examples/" >&2
            exit 1
          fi
          for script in "${scripts[@]}"; do
            echo "Running $script"
            xvfb-run -a ./target/debug/bearcad --script "$script" --exit
          done

  build-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os_slug: linux-x86_64
            artifact: bearcad-linux-x86_64.tar.gz
          - runner: macos-latest
            os_slug: macos-aarch64
            artifact: bearcad-macos-aarch64.dmg
          - runner: windows-latest
            os_slug: windows-x86_64
            artifact: bearcad.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: release-${{ matrix.os_slug }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libwayland-dev \
            libssl-dev \
            libvulkan-dev \
            mesa-vulkan-drivers \
            libgtk-3-dev

      - name: cargo build --release
        run: cargo build --release

      - name: Package Linux release
        if: matrix.os_slug == 'linux-x86_64'
        run: bash scripts/package-release.sh linux

      - name: Package macOS release
        if: matrix.os_slug == 'macos-aarch64'
        run: bash scripts/package-release.sh macos

      - name: Package Windows release
        if: matrix.os_slug == 'windows-x86_64'
        shell: pwsh
        run: pwsh scripts/package-windows.ps1

      - name: Upload release artifact
        uses: actions/upload-artifact@v5
        with:
          name: bearcad-${{ matrix.os_slug }}
          path: ${{ matrix.artifact }}

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read package version
        id: version
        run: echo "version=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: v${{ steps.version.outputs.version }} build ${{ github.run_number }}
          prerelease: true
          generate_release_notes: true
          files: artifacts/*