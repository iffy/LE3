name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libssl-dev \
            libvulkan-dev \
            mesa-vulkan-drivers \
            xvfb

      - name: cargo test
        run: cargo test

      - name: cargo build
        run: cargo build

      - name: Launch smoke test
        run: |
          set +e
          timeout 2 xvfb-run -a ./target/debug/le3
          code=$?
          set -e
          if [[ $code -eq 0 || $code -eq 124 ]]; then
            echo "App launched successfully (exit code $code)."
          else
            echo "App failed to launch (exit code $code)." >&2
            exit "$code"
          fi

      - name: Run example scripts
        run: |
          shopt -s nullglob
          scripts=(examples/*.le3script)
          if [[ ${#scripts[@]} -eq 0 ]]; then
            echo "No example scripts found in examples/" >&2
            exit 1
          fi
          for script in "${scripts[@]}"; do
            echo "Running $script"
            xvfb-run -a ./target/debug/le3 --script "$script" --exit
          done